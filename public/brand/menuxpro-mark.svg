<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- MenuxPRO Logo Mark - Premium Café Identity -->
  <!-- Elegant M mark with subtle menu/card shape and QR hint -->
  
  <!-- Background rounded square -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="#3A322D"/>
  
  <!-- Inner accent border -->
  <rect x="8" y="8" width="48" height="48" rx="10" stroke="#C9A07E" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- Stylized M mark -->
  <path d="M18 44V20L32 34L46 20V44" 
        stroke="#C9A07E" 
        stroke-width="4" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
  
  <!-- Subtle QR hint dots -->
  <circle cx="22" cy="24" r="2" fill="#C9A07E" opacity="0.4"/>
  <circle cx="42" cy="24" r="2" fill="#C9A07E" opacity="0.4"/>
  <circle cx="22" cy="42" r="2" fill="#C9A07E" opacity="0.4"/>
  <rect x="38" y="38" width="6" height="6" rx="1" fill="#C9A07E" opacity="0.4"/>
</svg>
