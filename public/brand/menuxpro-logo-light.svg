<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none">
  <!-- MenuxPRO Logo - Light Background Variant -->
  <!-- For use on espresso backgrounds - cream/gold on dark -->
  
  <!-- Logo Mark -->
  <g transform="translate(0, 0)">
    <!-- Background rounded square -->
    <rect x="4" y="4" width="56" height="56" rx="14" fill="#FCFBF9"/>
    
    <!-- Inner accent border -->
    <rect x="8" y="8" width="48" height="48" rx="10" stroke="#C9A07E" stroke-width="1.5" fill="none" opacity="0.8"/>
    
    <!-- Stylized M mark -->
    <path d="M18 44V20L32 34L46 20V44" 
          stroke="#3A322D" 
          stroke-width="4" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- Subtle QR hint dots -->
    <circle cx="22" cy="24" r="2" fill="#3A322D" opacity="0.4"/>
    <circle cx="42" cy="24" r="2" fill="#3A322D" opacity="0.4"/>
    <circle cx="22" cy="42" r="2" fill="#3A322D" opacity="0.4"/>
    <rect x="38" y="38" width="6" height="6" rx="1" fill="#3A322D" opacity="0.4"/>
  </g>
  
  <!-- Wordmark -->
  <g transform="translate(72, 0)">
    <!-- Menux -->
    <text x="0" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="600" fill="#FCFBF9" letter-spacing="-0.5">
      Menux
    </text>
    
    <!-- PRO -->
    <text x="106" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="600" fill="#C9A07E" letter-spacing="1">
      PRO
    </text>
  </g>
</svg>
